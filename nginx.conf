server {
    listen 80;
    
    root /usr/share/nginx/html;
    index index.html;

    # O redirecionamento crucial para funcionar com o React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Configuração de cache para arquivos estáticos
    location ~* \.(?:css|js|jpg|svg|png|woff2?)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}
